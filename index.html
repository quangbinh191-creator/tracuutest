<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRA CỨU DỰ ĐOÁN WORLD CUP 2026 🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%); }
    </style>
</head>
<body class="min-h-screen text-slate-100 p-4">

    <header class="text-center my-8">
        <h1 class="text-3xl sm:text-5xl font-black text-white uppercase">TRA CỨU DỰ ĐOÁN</h1>
    </header>

    <main class="w-full max-w-md mx-auto bg-slate-900/80 p-8 rounded-2xl border border-slate-700">
        <form id="searchForm" onsubmit="handleSearch(event)" class="space-y-4">
            <input type="text" id="nickname" required placeholder="Nickname" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-600">
            <input type="email" id="email" required placeholder="Email" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-600">
            <button type="submit" class="w-full bg-green-600 py-3 rounded-lg font-bold">⚽ TRA CỨU</button>
        </form>
    </main>

    <section id="resultContainer" class="hidden w-full max-w-4xl mx-auto mt-10 bg-slate-900/90 rounded-2xl p-6 border border-yellow-500/30">
        <div class="flex gap-4 mb-6 border-b border-slate-700">
            <button onclick="switchTab('vongBang')" id="btnVongBang" class="pb-2 border-b-2 border-green-500 font-bold">Vòng Bảng</button>
            <button onclick="switchTab('vongLoai')" id="btnVongLoai" class="pb-2 border-b-2 border-transparent hover:border-slate-500">Vòng Loại</button>
        </div>
        
        <div id="tableContent" class="overflow-x-auto">
            </div>
    </section>

    <script>
        // Cấu hình URL Sheet chung của bạn
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=1421278402&single=true&output=csv';
        let fullData = [];
        let currentUser = null;

        async function handleSearch(event) {
            event.preventDefault();
            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value.trim();

            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            fullData = Papa.parse(csvText).data;

            // Tìm người chơi từ dòng 4 (index 3)
            currentUser = fullData.slice(3).find(row => 
                row[0]?.trim().toLowerCase() === nickname.toLowerCase() && 
                row[1]?.trim().toLowerCase() === email.toLowerCase()
            );

            if (!currentUser) return alert('Không tìm thấy người chơi!');
            document.getElementById('resultContainer').classList.remove('hidden');
            renderTable('vongBang');
        }

        function renderTable(tab) {
            const container = document.getElementById('tableContent');
            const headers = fullData[0]; // Giả định dòng 1 là tiêu đề
            const resultRow = fullData[2]; // Dòng 3 là đáp án BTC
            
            let html = `<table class="w-full text-sm"><thead><tr><th>Hạng mục</th><th>Bạn chọn</th><th>Kết quả</th></tr></thead><tbody>`;
            
            // Logic tùy chỉnh cột theo tab ở đây...
            // Ví dụ: Vòng bảng lấy cột 2-20, Vòng loại lấy 21-40
            fullData.slice(3).forEach((row, i) => {
                if(row[0] === currentUser[0]) { // Hiển thị dòng của người đó
                    html += `<tr><td>Ví dụ</td><td>${row[2]}</td><td>${resultRow[2]}</td></tr>`;
                }
            });

            container.innerHTML = html + `</tbody></table>`;
        }

        function switchTab(tab) {
            document.getElementById('btnVongBang').className = tab === 'vongBang' ? "pb-2 border-b-2 border-green-500 font-bold" : "pb-2 border-b-2 border-transparent";
            document.getElementById('btnVongLoai').className = tab === 'vongLoai' ? "pb-2 border-b-2 border-green-500 font-bold" : "pb-2 border-b-2 border-transparent";
            renderTable(tab);
        }
    </script>
</body>
</html>
