<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRA CỨU DỰ ĐOÁN WORLD CUP 2026 🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, rgba(6, 78, 59, 0.8) 0%, rgba(15, 23, 42, 0.85) 100%), 
                        url('https://phongvu.vn/cong-nghe/wp-content/uploads/2022/12/hinh-nen-bong-da-1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .text-neon {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.6), 0 0 20px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col items-center p-4 sm:p-8 selection:bg-yellow-400 selection:text-black">

    <header class="text-center my-8 max-w-2xl animate-fade-in">
        <div class="inline-block bg-yellow-500 text-slate-900 text-xs font-black px-4 py-1 rounded-full uppercase tracking-widest mb-3 shadow-lg shadow-yellow-500/20">
            FIFA World Cup 2026 🇺🇸 🇨🇦 🇲🇽
        </div>
        <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-white uppercase text-neon">
            TRA CỨU <span class="text-green-400">DỰ ĐOÁN</span>
        </h1>
        <p class="text-slate-400 mt-2 text-sm sm:text-base">Chọn vòng đấu và nhập thông tin cá nhân để xem điểm của bạn!</p>
    </header>

    <main class="w-full max-w-md bg-slate-900/80 backdrop-blur-md border border-slate-700/50 p-6 sm:p-8 rounded-2xl shadow-2xl shadow-black/50">
        
        <!-- THANH CHUYỂN TAB -->
        <div class="flex space-x-2 mb-6 bg-slate-800/50 p-1 rounded-xl">
            <button type="button" id="tabGroup" onclick="switchTab('group')" class="flex-1 py-2.5 rounded-lg bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold text-sm shadow-md transition-all uppercase tracking-wide">
                Vòng Loại
            </button>
            <button type="button" id="tabKnockout" onclick="switchTab('knockout')" class="flex-1 py-2.5 rounded-lg text-slate-400 font-bold text-sm hover:bg-slate-700/50 hover:text-white transition-all uppercase tracking-wide">
                Knockout
            </button>
        </div>

        <form id="searchForm" onsubmit="handleSearch(event)" class="space-y-5">
            <div>
                <label for="nickname" class="block text-xs font-bold uppercase tracking-wider text-green-400 mb-2">
                    Nickname (Biệt danh hiển thị BXH)
                </label>
                <input type="text" id="nickname" required autocomplete="off"
                    placeholder="Ví dụ: Pele_2026" 
                    class="w-full bg-slate-800/85 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all font-medium">
            </div>

            <div>
                <label for="email" class="block text-xs font-bold uppercase tracking-wider text-green-400 mb-2">
                    Password (Email đăng ký)
                </label>
                <input type="email" id="email" required autocomplete="on"
                    placeholder="name@example.com" 
                    class="w-full bg-slate-800/85 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all font-medium">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-green-500/20 active:scale-[0.99] transition-all cursor-pointer text-center uppercase tracking-wider text-sm flex items-center justify-center gap-2">
                ⚽ Bắt Đầu Tra Cứu
            </button>
        </form>
    </main>

    <section id="resultContainer" class="hidden w-full max-w-2xl mt-10 bg-slate-900/95 border-2 border-yellow-500/30 rounded-2xl p-6 shadow-2xl backdrop-blur-md">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-700 pb-4 mb-4 gap-2">
            <div>
                <h2 id="resultTitle" class="text-xl font-bold text-yellow-400 flex items-center gap-2">
                    📋 KẾT QUẢ DỰ ĐOÁN
                </h2>
                <p class="text-xs text-slate-400 mt-1">Dữ liệu được cập nhật trực tiếp từ Ban Tổ Chức</p>
            </div>
            <span id="userBadge" class="bg-blue-500 text-white font-bold px-3 py-1 rounded-lg text-xs uppercase tracking-wide">
                -
            </span>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-800">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-800 text-slate-300 uppercase text-xs tracking-wider">
                    <tr>
                        <th class="px-4 py-3 font-bold text-green-400">Hạng mục dự đoán (Cột)</th>
                        <th class="px-4 py-3 font-bold text-yellow-400">Nội dung / Điểm số</th>
                    </tr>
                </thead>
                <tbody id="resultTableBody" class="divide-y divide-slate-800">
                </tbody>
            </table>
        </div>
    </section>

    <script>
        // CẤU HÌNH DỮ LIỆU 2 VÒNG ĐẤU
        const CONFIG = {
            group: {
                url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=267813523&single=true&output=csv',
                startRow: 1, // Dữ liệu người chơi bắt đầu từ dòng thứ 2 (index 1)
                title: '📋 KẾT QUẢ VÒNG LOẠI'
            },
            knockout: {
                url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=1421278402&single=true&output=csv',
                startRow: 3, // Dữ liệu người chơi bắt đầu từ dòng thứ 4 (index 3)
                title: '📋 KẾT QUẢ VÒNG KNOCKOUT'
            }
        };

        // Mặc định là vòng loại
        let currentMode = 'group';

        // Hàm chuyển đổi Tab
        function switchTab(mode) {
            currentMode = mode;
            const tabGroup = document.getElementById('tabGroup');
            const tabKnockout = document.getElementById('tabKnockout');
            const resultContainer = document.getElementById('resultContainer');
            
            // Ẩn bảng kết quả khi đổi tab để yêu cầu người dùng tra cứu lại
            resultContainer.classList.add('hidden');

            const activeClass = "flex-1 py-2.5 rounded-lg bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold text-sm shadow-md transition-all uppercase tracking-wide";
            const inactiveClass = "flex-1 py-2.5 rounded-lg text-slate-400 font-bold text-sm hover:bg-slate-700/50 hover:text-white transition-all uppercase tracking-wide";

            if (mode === 'group') {
                tabGroup.className = activeClass;
                tabKnockout.className = inactiveClass;
            } else {
                tabKnockout.className = activeClass;
                tabGroup.className = inactiveClass;
            }
        }

        async function handleSearch(event) {
            event.preventDefault();
            
            const nicknameInput = document.getElementById('nickname').value.trim();
            const emailInput = document.getElementById('email').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const resultTableBody = document.getElementById('resultTableBody');
            const userBadge = document.getElementById('userBadge');
            const resultTitle = document.getElementById('resultTitle');

            // Lấy cấu hình của Vòng hiện tại đang chọn
            const config = CONFIG[currentMode];

            try {
                const response = await fetch(config.url);
                const csvText = await response.text();

                Papa.parse(csvText, {
                    header: false,
                    complete: function(results) {
                        const rows = results.data;
                        if (rows.length <= config.startRow) {
                            alert('Không tìm thấy đủ dữ liệu trên hệ thống Sheet.');
                            return;
                        }

                        let compositeHeaders = [];
                        
                        // XỬ LÝ TIÊU ĐỀ RIÊNG BIỆT CHO TỪNG VÒNG
                        if (currentMode === 'group') {
                            // Vòng loại: Chỉ lấy 1 dòng tiêu đề (Dòng đầu tiên)
                            const headers = rows[0];
                            for(let c = 0; c < headers.length; c++) {
                                compositeHeaders.push(headers[c]?.trim() || `Cột ${c + 1}`);
                            }
                        } else {
                            // Vòng Knockout: Ghép từ 3 dòng tiêu đề (Dòng 1, 2, 3)
                            const numCols = Math.max(rows[0]?.length || 0, rows[1]?.length || 0, rows[2]?.length || 0);
                            let lastH0 = ''; 
                            for (let c = 0; c < numCols; c++) {
                                let h0 = rows[0] && rows[0][c] ? rows[0][c].trim() : '';
                                let h1 = rows[1] && rows[1][c] ? rows[1][c].trim() : '';
                                let h2 = rows[2] && rows[2][c] ? rows[2][c].trim() : '';
                                
                                if (h0 !== '') lastH0 = h0; else h0 = lastH0;
                                let parts = [h0, h1, h2].filter(Boolean);
                                let uniqueParts = [...new Set(parts)];
                                compositeHeaders.push(uniqueParts.length > 0 ? uniqueParts.join(' - ') : `Cột ${c + 1}`);
                            }
                        }

                        // Tìm cột Biệt danh và Email
                        const idxNickname = compositeHeaders.findIndex(h => h.toLowerCase().includes('biệt danh'));
                        const idxEmail = compositeHeaders.findIndex(h => h.toLowerCase().includes('email'));

                        if (idxNickname === -1 || idxEmail === -1) {
                            alert('Lỗi cấu hình: Dữ liệu Sheet bắt buộc phải có từ khóa "Biệt danh" và "Email".');
                            return;
                        }

                        let foundUserRow = null;
                        // Bắt đầu duyệt từ dòng cấu hình (Group=1, Knockout=3)
                        for (let i = config.startRow; i < rows.length; i++) {
                            const currentRow = rows[i];
                            if (!currentRow || currentRow.length === 0) continue; 
                            
                            if (
                                currentRow[idxNickname]?.trim().toLowerCase() === nicknameInput.toLowerCase() &&
                                currentRow[idxEmail]?.trim().toLowerCase() === emailInput.toLowerCase()
                            ) {
                                foundUserRow = currentRow;
                                break;
                            }
                        }

                        if (!foundUserRow) {
                            alert('❌ Sai Nickname hoặc Password (Email) rồi! Vui lòng kiểm tra kỹ lại.');
                            resultContainer.classList.add('hidden');
                            return;
                        }

                        let tableContentHtml = '';
                        
                        // Nếu là Vòng Loại: Cắt ở cột 79 theo format cũ. Nếu Knockout: Quét toàn bộ.
                        const maxColumns = currentMode === 'group' 
                                            ? Math.min(79, compositeHeaders.length) 
                                            : compositeHeaders.length;

                        for (let colIdx = 0; colIdx < maxColumns; colIdx++) {
                            const columnName = compositeHeaders[colIdx];
                            const userValue = foundUserRow[colIdx]?.trim() || '---';
                            
                            // Bỏ qua cột rỗng ở Knockout
                            if (currentMode === 'knockout' && columnName.startsWith('Cột') && userValue === '---') {
                                continue;
                            }

                            const rowBg = colIdx % 2 === 0 ? 'bg-slate-900/40' : 'bg-slate-800/30';
                            let valueColor = 'text-yellow-400';

                            // Áp dụng format màu sắc Điểm Cộng / Điểm Trừ cho Vòng Knockout
                            if (currentMode === 'knockout') {
                                if (userValue === '+1' || (!isNaN(userValue) && Number(userValue) > 0)) {
                                    valueColor = 'text-green-400';
                                } else if (userValue === '0' || userValue.startsWith('-')) {
                                    valueColor = 'text-red-400';
                                }
                            }

                            tableContentHtml += `
                                <tr class="${rowBg} hover:bg-slate-800/80 transition-colors">
                                    <td class="px-4 py-3.5 font-semibold text-slate-300 border-r border-slate-800">${columnName}</td>
                                    <td class="px-4 py-3.5 ${valueColor} font-bold tracking-wide">${userValue}</td>
                                </tr>
                            `;
                        }

                        resultTitle.innerHTML = config.title;
                        userBadge.innerText = `🎮 ${foundUserRow[idxNickname]}`;
                        resultTableBody.innerHTML = tableContentHtml;
                        resultContainer.classList.remove('hidden');
                        
                        resultContainer.scrollIntoView({ behavior: 'smooth' });
                    },
                    error: function(err) {
                        alert('Lỗi phân tách dữ liệu. Vui lòng liên hệ Admin.');
                        console.error(err);
                    }
                });

            } catch (error) {
                alert('Không thể kết nối đến Google Sheet. Hãy kiểm tra lại link CSV hoặc mạng internet.');
                console.error(error);
            }
        }
    </script>
</body>
</html>
