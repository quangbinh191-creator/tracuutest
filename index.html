<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRA CỨU DỰ ĐOÁN WORLD CUP 2026 🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, rgba(6, 78, 59, 0.8) 0%, rgba(15, 23, 42, 0.85) 100%), 
                        url('https://phongvu.vn/cong-nghe/wp-content/uploads/2022/12/hinh-nen-bong-da-1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .text-neon {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.6), 0 0 20px rgba(34, 197, 94, 0.4);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col items-center p-4 sm:p-8 selection:bg-yellow-400 selection:text-black">

    <header class="text-center my-8 max-w-2xl animate-fade-in">
        <div class="inline-block bg-yellow-500 text-slate-900 text-xs font-black px-4 py-1 rounded-full uppercase tracking-widest mb-3 shadow-lg shadow-yellow-500/20">
            FIFA World Cup 2026 🇺🇸 🇨🇦 🇲🇽
        </div>
        <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-white uppercase text-neon">
            TRA CỨU <span class="text-green-400">DỰ ĐOÁN</span>
        </h1>
        <p class="text-slate-400 mt-2 text-sm sm:text-base">Nhập thông tin cá nhân để xem lại hành trình tiên tri của bạn!</p>
    </header>

    <main class="w-full max-w-md bg-slate-900/80 backdrop-blur-md border border-slate-700/50 p-6 sm:p-8 rounded-2xl shadow-2xl shadow-black/50">
        <form id="searchForm" onsubmit="handleSearch(event)" class="space-y-5">
            <div>
                <label for="nickname" class="block text-xs font-bold uppercase tracking-wider text-green-400 mb-2">
                    Nickname (Biệt danh hiển thị BXH)
                </label>
                <input type="text" id="nickname" required autocomplete="off"
                    placeholder="Ví dụ: Pele_2026" 
                    class="w-full bg-slate-800/85 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all font-medium">
            </div>

            <div>
                <label for="email" class="block text-xs font-bold uppercase tracking-wider text-green-400 mb-2">
                    Password (Email đăng ký)
                </label>
                <input type="email" id="email" required autocomplete="on"
                    placeholder="name@example.com" 
                    class="w-full bg-slate-800/85 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all font-medium">
            </div>

            <button type="submit" 
                class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-green-500/20 active:scale-[0.99] transition-all cursor-pointer text-center uppercase tracking-wider text-sm flex items-center justify-center gap-2">
                ⚽ Bắt Đầu Tra Cứu
            </button>
        </form>
    </main>

    <section id="resultContainer" class="hidden w-full max-w-4xl mt-10 bg-slate-900/95 border-2 border-yellow-500/30 rounded-2xl p-6 shadow-2xl backdrop-blur-md">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-700 pb-4 mb-4 gap-2">
            <div>
                <h2 class="text-xl font-bold text-yellow-400 flex items-center gap-2">
                    📋 KẾT QUẢ DỰ ĐOÁN
                </h2>
                <p class="text-xs text-slate-400 mt-1">Dữ liệu được cập nhật trực tiếp từ Ban Tổ Chức</p>
            </div>
            <span id="userBadge" class="bg-blue-500 text-white font-bold px-3 py-1 rounded-lg text-xs uppercase tracking-wide">
                -
            </span>
        </div>

        <div class="flex border-b border-slate-700 mb-4 gap-2">
            <button onclick="switchTab('group')" id="tabGroupBtn" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-green-500 text-green-400 bg-slate-800/50">
                ⚽ VÒNG BẢNG
            </button>
            <button onclick="switchTab('knockout')" id="tabKnockoutBtn" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-slate-400 hover:text-white">
                🏆 VÒNG KNOCKOUT
            </button>
        </div>

        <div id="groupTableWrapper" class="overflow-x-auto rounded-xl border border-slate-800">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-800 text-slate-300 uppercase text-xs tracking-wider">
                    <tr>
                        <th class="px-4 py-3 font-bold text-green-400 w-1/2">Hạng mục dự đoán (Cột)</th>
                        <th class="px-4 py-3 font-bold text-yellow-400 w-1/2">Nội dung bạn chọn</th>
                    </tr>
                </thead>
                <tbody id="resultTableBody" class="divide-y divide-slate-800">
                </tbody>
            </table>
        </div>

        <div id="knockoutTableWrapper" class="hidden overflow-x-auto rounded-xl border border-slate-800">
            <div class="bg-slate-800/80 p-3 px-4 text-sm font-bold text-yellow-400 flex justify-between items-center border-b border-slate-700">
                <span>Tổng điểm Vòng Knockout tạm tính:</span>
                <span id="totalKnockoutPoints" class="text-xl text-green-400 bg-slate-900 px-3 py-1 rounded-lg border border-green-500/30">0đ</span>
            </div>
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-800 text-slate-300 uppercase text-xs tracking-wider">
                    <tr>
                        <th class="px-4 py-3 font-bold text-green-400">Trận Đấu</th>
                        <th class="px-4 py-3 font-bold text-blue-400 text-center">Đáp Án BTC</th>
                        <th class="px-4 py-3 font-bold text-yellow-400 text-center">Bạn Chọn</th>
                        <th class="px-4 py-3 font-bold text-purple-400 text-center">NSHV</th>
                        <th class="px-4 py-3 font-bold text-emerald-400 text-center">Điểm số</th>
                    </tr>
                </thead>
                <tbody id="knockoutTableBody" class="divide-y divide-slate-800">
                </tbody>
            </table>
        </div>
    </section>

    <script>
        const URL_GROUP_STAGE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=267813523&single=true&output=csv';
        const URL_KNOCKOUT_STAGE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=1421278402&single=true&output=csv';

        let globalNickname = "";
        let currentGroupHtml = "";
        let currentKnockoutHtml = "";
        let totalKoPoints = 0;

        // Hàm loại bỏ khoảng trắng và viết thường để so sánh chuỗi chính xác tuyệt đối
        function cleanStr(str) {
            return (str || "").toString().trim().toLowerCase().replace(/\s+/g, '');
        }

        async function handleSearch(event) {
            event.preventDefault();
            
            const nicknameInput = document.getElementById('nickname').value.trim();
            const emailInput = document.getElementById('email').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            
            resultContainer.classList.add('hidden');
            currentGroupHtml = "";
            currentKnockoutHtml = "";
            totalKoPoints = 0;

            try {
                // 1. XỬ LÝ VÒNG BẢNG
                const resGroup = await fetch(URL_GROUP_STAGE);
                const csvGroup = await resGroup.text();
                let isGroupFound = false;

                Papa.parse(csvGroup, {
                    header: false,
                    complete: function(results) {
                        const rows = results.data;
                        if (rows.length >= 2) {
                            const headers = rows[0];
                            const idxNickname = headers.findIndex(h => h.trim().toLowerCase() === 'biệt danh');
                            const idxEmail = headers.findIndex(h => h.trim().toLowerCase() === 'email');

                            if (idxNickname !== -1 && idxEmail !== -1) {
                                let foundRow = rows.find((r, idx) => idx > 0 && r[idxNickname]?.trim().toLowerCase() === nicknameInput.toLowerCase() && r[idxEmail]?.trim().toLowerCase() === emailInput.toLowerCase());
                                
                                if (foundRow) {
                                    isGroupFound = true;
                                    globalNickname = foundRow[idxNickname]?.trim();
                                    const maxColumns = Math.min(79, headers.length);
                                    for (let colIdx = 0; colIdx < maxColumns; colIdx++) {
                                        const columnName = headers[colIdx]?.trim() || `Cột ${colIdx + 1}`;
                                        const userValue = foundRow[colIdx]?.trim() || '---';
                                        const rowBg = colIdx % 2 === 0 ? 'bg-slate-900/40' : 'bg-slate-800/30';
                                        currentGroupHtml += `
                                            <tr class="${rowBg} hover:bg-slate-800/80 transition-colors">
                                                <td class="px-4 py-3.5 font-semibold text-slate-300 border-r border-slate-800">${columnName}</td>
                                                <td class="px-4 py-3.5 text-yellow-400 font-bold tracking-wide">${userValue}</td>
                                            </tr>
                                        `;
                                    }
                                }
                            }
                        }
                    }
                });

                // 2. XỬ LÝ VÒNG KNOCKOUT
                const resKnockout = await fetch(URL_KNOCKOUT_STAGE);
                const csvKnockout = await resKnockout.text();
                let isKnockoutFound = false;

                Papa.parse(csvKnockout, {
                    header: false,
                    complete: function(results) {
                        const rows = results.data;
                        if (rows.length < 4) return; 

                        const rowMatches = rows[0];  // Hàng 1: Tên các trận đấu
                        const rowBTC = rows[2];      // Hàng 3: Kết quả chung cuộc từ BTC
                        
                        const idxNickname = rowMatches.findIndex(h => h && h.trim().toLowerCase() === 'biệt danh');
                        const idxEmail = rowMatches.findIndex(h => h && h.trim().toLowerCase() === 'email');
                        const idxStar1 = rowMatches.findIndex(h => h && h.trim().toLowerCase() === 'ngôi sao hy vọng 1');
                        const idxStar2 = rowMatches.findIndex(h => h && h.trim().toLowerCase() === 'ngôi sao hy vọng 2');

                        if (idxNickname === -1 || idxEmail === -1) return;

                        let foundUserRow = null;
                        for (let i = 3; i < rows.length; i++) {
                            if (rows[i][idxNickname]?.trim().toLowerCase() === nicknameInput.toLowerCase() &&
                                rows[i][idxEmail]?.trim().toLowerCase() === emailInput.toLowerCase()) {
                                foundUserRow = rows[i];
                                break;
                            }
                        }

                        if (foundUserRow) {
                            isKnockoutFound = true;
                            if(!globalNickname) globalNickname = foundUserRow[idxNickname]?.trim();

                            // Lấy giá trị chuỗi đã được làm sạch của NSHV 1 & 2
                            const nshv1Clean = cleanStr(foundUserRow[idxStar1]);
                            const nshv2Clean = cleanStr(foundUserRow[idxStar2]);

                            let matchCount = 0;
                            for (let colIdx = 0; colIdx < rowMatches.length; colIdx++) {
                                const matchName = rowMatches[colIdx]?.trim();
                                
                                if (!matchName || 
                                    colIdx === idxNickname || 
                                    colIdx === idxEmail || 
                                    colIdx === idxStar1 || 
                                    colIdx === idxStar2 ||
                                    matchName.toLowerCase().includes('thời gian') ||
                                    matchName.toLowerCase().includes('tổng điểm')) {
                                    continue;
                                }

                                matchCount++;
                                const btcResult = rowBTC[colIdx]?.trim() || '';
                                const userPredict = foundUserRow[colIdx]?.trim() || '';
                                
                                // So sánh chuỗi đã được chuẩn hóa để nhận diện Ngôi Sao Hy Vọng chính xác hơn
                                const currentMatchClean = cleanStr(matchName);
                                const isStar = (currentMatchClean === nshv1Clean || currentMatchClean === nshv2Clean) && userPredict !== '';
                                
                                let points = 0;
                                let pointsClass = "text-slate-400";
                                let pointsStr = "0";

                                // Chỉ tính điểm khi BTC đã cập nhật kết quả và Người chơi có chọn đáp án
                                if (btcResult !== '' && btcResult.toLowerCase() !== 'chưa có' && userPredict !== '' && userPredict !== '---') {
                                    const isCorrect = cleanStr(userPredict) === cleanStr(btcResult);
                                    if (isCorrect) {
                                        points = isStar ? 2 : 1;
                                        pointsClass = "text-green-400 font-black";
                                        pointsStr = `+${points}`;
                                    } else {
                                        points = isStar ? -1 : 0;
                                        pointsClass = isStar ? "text-red-500 font-black" : "text-slate-400";
                                        pointsStr = points.toString();
                                    }
                                    totalKoPoints += points;
                                } else {
                                    pointsStr = "---";
                                }

                                const rowBg = matchCount % 2 === 0 ? 'bg-slate-900/40' : 'bg-slate-800/30';

                                currentKnockoutHtml += `
                                    <tr class="${rowBg} hover:bg-slate-800/80 transition-colors text-center">
                                        <td class="px-4 py-3.5 font-semibold text-slate-300 text-left border-r border-slate-800">${matchName}</td>
                                        <td class="px-4 py-3.5 text-blue-300 font-medium">${btcResult || 'Chưa có'}</td>
                                        <td class="px-4 py-3.5 text-yellow-400 font-bold">${userPredict || '---'}</td>
                                        <td class="px-4 py-3.5">${isStar ? '⭐' : '—'}</td>
                                        <td class="px-4 py-3.5 ${pointsClass}">${pointsStr}</td>
                                    </tr>
                                `;
                            }
                        }
                    }
                });

                await new Promise(resolve => setTimeout(resolve, 400));

                if (!isGroupFound && !isKnockoutFound) {
                    alert('❌ Sai Nickname hoặc Email đăng ký rồi! Vui lòng kiểm tra kỹ lại.');
                    return;
                }

                document.getElementById('userBadge').innerText = `🎮 ${globalNickname || nicknameInput}`;
                document.getElementById('resultTableBody').innerHTML = currentGroupHtml || `<tr><td colspan="2" class="p-4 text-center text-slate-500">Không có dữ liệu vòng bảng</td></tr>`;
                document.getElementById('knockoutTableBody').innerHTML = currentKnockoutHtml || `<tr><td colspan="5" class="p-4 text-center text-slate-500">Không có dữ liệu vòng knockout</td></tr>`;
                document.getElementById('totalKnockoutPoints').innerText = `${totalKoPoints}đ`;

                switchTab('group');
                resultContainer.classList.remove('hidden');
                resultContainer.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert('Không thể kết nối đến hệ thống Google Sheet. Hãy kiểm tra lại kết nối mạng hoặc liên hệ Admin.');
                console.error(error);
            }
        }

        function switchTab(tabName) {
            const tabGroupBtn = document.getElementById('tabGroupBtn');
            const tabKnockoutBtn = document.getElementById('tabKnockoutBtn');
            const groupTableWrapper = document.getElementById('groupTableWrapper');
            const knockoutTableWrapper = document.getElementById('knockoutTableWrapper');

            if (tabName === 'group') {
                tabGroupBtn.classList.add('border-green-500', 'text-green-400', 'bg-slate-800/50');
                tabGroupBtn.classList.remove('border-transparent', 'text-slate-400');
                groupTableWrapper.classList.remove('hidden');

                tabKnockoutBtn.classList.remove('border-green-500', 'text-green-400', 'bg-slate-800/50');
                tabKnockoutBtn.classList.add('border-transparent', 'text-slate-400');
                knockoutTableWrapper.classList.add('hidden');
            } else {
                tabKnockoutBtn.classList.add('border-green-500', 'text-green-400', 'bg-slate-800/50');
                tabKnockoutBtn.classList.remove('border-transparent', 'text-slate-400');
                knockoutTableWrapper.classList.remove('hidden');

                tabGroupBtn.classList.remove('border-green-500', 'text-green-400', 'bg-slate-800/50');
                tabGroupBtn.classList.add('border-transparent', 'text-slate-400');
                groupTableWrapper.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
