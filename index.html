<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TRA CỨU DỰ ĐOÁN WORLD CUP 2026 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background: linear-gradient(135deg, rgba(6, 78, 59, 0.8) 0%, rgba(15, 23, 42, 0.85) 100%); font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col items-center p-4">

    <header class="text-center my-8">
        <h1 class="text-3xl sm:text-5xl font-black text-white uppercase tracking-tight">TRA CỨU DỰ ĐOÁN</h1>
    </header>

    <main class="w-full max-w-md bg-slate-900/80 p-6 rounded-2xl shadow-2xl" id="loginArea">
        <form id="searchForm" onsubmit="handleLogin(event)" class="space-y-4">
            <input type="text" id="nickname" required placeholder="Nickname" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600">
            <input type="email" id="email" required placeholder="Email" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-600">
            <button type="submit" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl font-bold uppercase">⚽ Bắt Đầu Tra Cứu</button>
        </form>
    </main>

    <section id="resultContainer" class="hidden w-full max-w-3xl mt-10">
        <div class="flex gap-2 mb-4">
            <button onclick="switchTab('vongLoai')" id="tabBtn1" class="px-6 py-2 bg-green-600 rounded-t-lg font-bold">Vòng Loại</button>
            <button onclick="switchTab('knockOut')" id="tabBtn2" class="px-6 py-2 bg-slate-800 rounded-t-lg font-bold">Vòng Knock-out</button>
        </div>
        
        <div class="bg-slate-900/95 border-2 border-yellow-500/30 p-6 rounded-b-2xl rounded-tr-2xl shadow-2xl">
            <div id="tableContent" class="overflow-x-auto"></div>
        </div>
    </section>

    <script>
        let userData = { nickname: '', email: '' };
        let activeTab = 'vongLoai';

        const CSV_URLS = {
            vongLoai: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=267813523&single=true&output=csv',
            knockOut: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQOu74BZum8hv_WCNc2lCqbSmV-YXWkwWTrQZ4LmAZgY8Tjj6d9DEA1h6P9E8_4qXWisZy9-atqMeUP/pub?gid=1421278402&single=true&output=csv'
        };

        function handleLogin(e) {
            e.preventDefault();
            userData.nickname = document.getElementById('nickname').value.trim();
            userData.email = document.getElementById('email').value.trim();
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            fetchData();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabBtn1').className = tab === 'vongLoai' ? 'px-6 py-2 bg-green-600 rounded-t-lg font-bold' : 'px-6 py-2 bg-slate-800 rounded-t-lg font-bold';
            document.getElementById('tabBtn2').className = tab === 'knockOut' ? 'px-6 py-2 bg-green-600 rounded-t-lg font-bold' : 'px-6 py-2 bg-slate-800 rounded-t-lg font-bold';
            fetchData();
        }

        async function fetchData() {
            const response = await fetch(CSV_URLS[activeTab]);
            const csvText = await response.text();
            Papa.parse(csvText, {
                header: false,
                complete: function(results) {
                    const rows = results.data;
                    // Logic lọc dữ liệu dựa trên nickname và email (giả định cột nickname/email ở index 0,1)
                    const found = rows.find(r => r[0]?.trim().toLowerCase() === userData.nickname.toLowerCase() && r[1]?.trim().toLowerCase() === userData.email.toLowerCase());
                    
                    if(!found) { alert('Không tìm thấy dữ liệu!'); return; }
                    renderTable(rows[0], found);
                }
            });
        }

        function renderTable(headers, values) {
            let html = '<table class="w-full text-left text-sm"><tbody class="divide-y divide-slate-800">';
            headers.forEach((h, i) => {
                html += `<tr><td class="p-3 text-green-400 font-bold">${h}</td><td class="p-3 text-yellow-400">${values[i] || '---'}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContent').innerHTML = html;
        }
    </script>
</body>
</html>
